<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 350px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form th:action="${registerUrl}" method="post" th:object="${userRegistration}">

        <input type="text" th:field="*{name}" placeholder="Full Name" required />

        <input type="email" th:field="*{email}" placeholder="Email" required />

        <input type="password" th:field="*{password}" placeholder="Password" required />

        <button type="submit">Register</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <p style="margin-top:15px;">
        Already have an account?
        <a th:href="${loginUrl}">Login</a>
    </p>
</div>

</body>
</html>
