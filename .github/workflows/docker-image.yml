name: Build Push and Deploy
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            shamim7999/e-ticket:${{ github.sha }}
            shamim7999/e-ticket:latest

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook ~/custom-ansible-roles/deployer/deploy-playbook.yaml \
            -i ~/custom-ansible-roles/deployer/inventory.ini \
            --extra-vars "IMAGE_TAG=${{ github.sha }}"